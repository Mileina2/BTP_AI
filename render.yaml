# Blueprint Render — API BTP IA
# Repo: https://github.com/Mileina2/BTP_AI

services:
  - type: web
    name: btpia-api
    runtime: node
    region: oregon
    plan: free
    rootDir: back
    buildCommand: npm install && npx prisma generate
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "4000"
      - key: TRUST_PROXY
        value: "true"
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 15m
      - key: JWT_REFRESH_EXPIRES_IN
        value: 7d
      - key: FRONTEND_URL
        value: https://btp-ia.vercel.app
      - key: API_PUBLIC_URL
        value: https://btpia-api.onrender.com
      - key: FORCE_HTTPS
        value: "true"
      - key: ASSISTANT_ENABLED
        value: "false"
      - key: SMTP_HOST
        value: smtp-relay.brevo.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_SECURE
        value: "false"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false
